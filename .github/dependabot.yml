version: 2
updates:
  # GitHub Actions versioning (highest priority)
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '03:00'
      timezone: 'Asia/Shanghai'
    open-pull-requests-limit: 10
    labels: ['dependencies', 'github-actions']
    groups:
      actions-minor-patch:
        update-types: ['minor', 'patch']

  # Node.js / TypeScript / Next.js
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '03:00'
      timezone: 'Asia/Shanghai'
    open-pull-requests-limit: 10
    labels: ['dependencies', 'npm']
    groups:
      npm-minor-patch:
        update-types: ['minor', 'patch']

  # PHP / Laravel
  - package-ecosystem: 'composer'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    labels: ['dependencies', 'php']

  # Python
  - package-ecosystem: 'pip'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    labels: ['dependencies', 'python']

  # Java Maven
  - package-ecosystem: 'maven'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    labels: ['dependencies', 'java']

  # Java Gradle
  - package-ecosystem: 'gradle'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    labels: ['dependencies', 'java']

  # Go modules
  - package-ecosystem: 'gomod'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    labels: ['dependencies', 'go']

  # .NET NuGet
  - package-ecosystem: 'nuget'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    labels: ['dependencies', 'dotnet']

  # Docker
  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    labels: ['dependencies', 'docker']
