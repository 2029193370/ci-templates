version: 2
updates:
  # GitHub Actions - pin to commit SHA, keep tag as comment
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '03:00'
      timezone: 'Asia/Shanghai'
    open-pull-requests-limit: 10
    labels: ['dependencies', 'github-actions', 'security']
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    groups:
      actions-minor-patch:
        update-types: ['minor', 'patch']

  # Separate entry for starter so consumer template tracks the same SHA pins
  - package-ecosystem: 'github-actions'
    directory: '/starter'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    labels: ['dependencies', 'github-actions']
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '03:00'
      timezone: 'Asia/Shanghai'
    open-pull-requests-limit: 10
    labels: ['dependencies', 'npm']
    commit-message:
      prefix: 'chore(deps)'
    groups:
      npm-minor-patch:
        update-types: ['minor', 'patch']

  - package-ecosystem: 'composer'
    directory: '/'
    schedule: { interval: 'weekly', day: 'monday' }
    open-pull-requests-limit: 5
    labels: ['dependencies', 'php']
    commit-message: { prefix: 'chore(deps)' }

  - package-ecosystem: 'pip'
