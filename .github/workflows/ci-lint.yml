name: CI - YAML Lint

on:
  pull_request:
    branches: [ 'main' ]
  push:
    branches: [ 'main' ]

jobs:
  yamllint:
    name: Yamllint for workflow files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.4.0

      - name: Set up Python
        uses: actions/setup-python@v5.1.0
        with:
          python-version: '3.x'

      - name: Install yamllint
        run: |
          python -m pip install --upgrade pip
          pip install yamllint

      - name: Run yamllint
        run: |
          yamllint -c '{extends: default, rules: {line-length: {max: 200}}}' .github/workflows || exit 1
