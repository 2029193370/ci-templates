name: CI - YAML Lint

on:
  pull_request:
    branches: [ 'main' ]
  push:
    branches: [ 'main' ]

jobs:
  yamllint:
    name: Yamllint for workflow files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize workflow line endings (CRLF -> LF)
        run: |
          find .github/workflows -type f \( -name "*.yml" -o -name "*.yaml" \) -print0 | xargs -0 -r sed -i 's/\r$//' || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install yamllint
        run: |
          python -m pip install --upgrade pip
          pip install yamllint

      - name: Run yamllint
        run: |
          cat > .yamllint <<'EOF'
          extends: default
          rules:
            line-length:
              max: 200
EOF
          yamllint -c .yamllint .github/workflows || exit 1
