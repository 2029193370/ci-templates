# ============================================================
# 可复用工作流 (Reusable Workflow)
# 仓库：2029193370/ci-templates
# 路径：.github/workflows/reusable-ci.yml
#
# 调用方式（在业务仓库 .github/workflows/ci.yml 中）：
#   jobs:
#     ci:
#       uses: 2029193370/ci-templates/.github/workflows/reusable-ci.yml@main
#
# 流水线结构：
#   Layer 0 - 仓库卫生检查 (编译产物 / 冲突标记 / 敏感文件 / 大文件)
#   Layer 1 - 代码质量检查 (Lint & Build) - 按项目文件自动分派
#   Layer 2 - 安全漏洞与密钥泄露扫描 (Trivy)
#   Layer 3 - 可选产物收集 & 覆盖率上报 (Codecov)
#
# 执行策略：所有检查全量执行再汇总，Layer 0 默认不阻断 Layer 1。
# 支持语言：Node.js/TS | Java | PHP | Python | Go | .NET | Docker
# ============================================================

name: Reusable CI & Security

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version'
        required: false
        type: string
        default: '22'
      java-version:
        description: 'Java version (LTS 17 or 21)'
        required: false
        type: string
        default: '17'
      php-version:
        description: 'PHP version'
        required: false
        type: string
        default: '8.2'
      python-version:
        description: 'Python version'
        required: false
        type: string
        default: '3.11'
      go-version:
        description: 'Go version'
        required: false
        type: string
        default: '1.22'
      dotnet-version:
        description: '.NET SDK version'
        required: false
        type: string
        default: '8.0'
      trivy-severity:
        description: 'Trivy severity threshold'
        required: false
        type: string
        default: 'CRITICAL,HIGH'
      trivy-exit-code:
        description: 'Exit code when Trivy finds issues (1 fail, 0 report only)'
        required: false
        type: string
        default: '1'
      fail-fast-on-hygiene:
        description: 'Whether Layer 0 failure blocks subsequent layers'
        required: false
        type: boolean
        default: false
    secrets:
      CODECOV_TOKEN:
        description: 'Optional Codecov upload token. When set, coverage upload is enabled.'
        required: false

permissions:
  contents: read

jobs:
  # ==========================================
  # Layer 0: Repo hygiene (full run, non-blocking)
  # ==========================================
  repo-hygiene:
    name: Layer 0 - Repo Hygiene Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Repo Hygiene Check
        run: |
          errors=0
          warnings=0

          echo "========== Build artifacts =========="
          for dir in node_modules __pycache__ .next .nuxt .gradle .pytest_cache dist build target out; do
            if [ -d "$dir" ]; then
              echo "::error::Committed build dir: $dir/ - add to .gitignore and run: git rm -r --cached $dir"
              errors=$((errors + 1))
            fi
          done

          if find . -maxdepth 4 -name "*.pyc" -not -path "./.git/*" -not -path "./node_modules/*" -print -quit 2>/dev/null | grep -q .; then
            echo "::error::Found *.pyc - add *.pyc and __pycache__/ to .gitignore"
            errors=$((errors + 1))
          fi

          if find . -maxdepth 4 -name "*.class" -not -path "./.git/*" -not -path "./node_modules/*" -print -quit 2>/dev/null | grep -q .; then
            echo "::error::Found *.class - add *.class to .gitignore"
            errors=$((errors + 1))
          fi

          echo ""
          echo "========== Merge conflict markers =========="
          conflicts=$(git grep -nI -E '^(<<<<<<< |=======$|>>>>>>> )' -- ':!*.lock' ':!*.min.*' 2>/dev/null || true)
          if [ -n "$conflicts" ]; then
            echo "$conflicts" | head -20
            echo "::error::Unresolved merge conflict markers detected"
            errors=$((errors + 1))
          fi

          echo ""
          echo "========== Sensitive files =========="
          for envfile in .env .env.local .env.development .env.production; do
            if [ -f "$envfile" ]; then
              echo "::warning::Detected $envfile - may contain secrets. Add to .gitignore and provide .env.example"
              warnings=$((warnings + 1))
            fi
          done

          if find . -maxdepth 3 \( -name "*.pem" -o -name "*.key" -o -name "*.p12" -o -name "*.pfx" \) -not -path './.git/*' 2>/dev/null | head -1 | grep -q .; then
            echo "::warning::Certificate/private key files detected - confirm they belong in the repo"
            warnings=$((warnings + 1))
          fi

          echo ""
          echo "========== Large files (>5MB) =========="
          large_files=$(find . -not -path './.git/*' -not -path './node_modules/*' -not -path './vendor/*' -type f -size +5M 2>/dev/null || true)
          if [ -n "$large_files" ]; then
            echo "::warning::Files over 5MB found - consider Git LFS:"
            echo "$large_files" | while IFS= read -r f; do
              size=$(du -h "$f" | cut -f1)
              echo "  $size  $f"
            done
            warnings=$((warnings + 1))
          fi

          echo ""
          echo "=========================================="
          echo "Result: ${errors} error(s), ${warnings} warning(s)"
          echo "=========================================="

          if [ $errors -gt 0 ]; then
            echo ""
            echo "Fix steps:"
            echo "  1. Add offending files/dirs to .gitignore"
            echo "  2. Run: git rm -r --cached <path>"
            echo "  3. Commit and push again"
            exit 1
          fi

  # ==========================================
  # Layer 1: Code quality (parallel jobs)
  # ==========================================
  node-check:
    name: Layer 1 - Node.js Lint & Build
    runs-on: ubuntu-latest
    needs: repo-hygiene
    timeout-minutes: 20
    if: ${{ !cancelled() && (!inputs.fail-fast-on-hygiene || needs.repo-hygiene.result == 'success') }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Detect Node.js project
        id: detect
        run: |
          if [ -n "$(find . -maxdepth 3 -name package.json -not -path '*/node_modules/*' -print -quit)" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No package.json, skipping Node.js check"
          fi

      - name: Setup Node.js
        if: steps.detect.outputs.found == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Node.js - Install, Lint, Build
        if: steps.detect.outputs.found == 'true'
        run: |
          if [ -f package-lock.json ]; then
            npm ci || { echo "::error::npm ci failed - check package-lock.json sync"; exit 1; }
          else
            echo "::warning::package-lock.json missing, falling back to npm install (not recommended for production)"
            npm install || { echo "::error::npm install failed"; exit 1; }
          fi

          failed=0
          npm run lint --if-present || { echo "::error::Node.js lint failed"; failed=1; }
          npm run build --if-present || { echo "::error::Node.js build failed"; failed=1; }
          exit $failed

  java-check:
    name: Layer 1 - Java Build
    runs-on: ubuntu-latest
    needs: repo-hygiene
    timeout-minutes: 20
    if: ${{ !cancelled() && (!inputs.fail-fast-on-hygiene || needs.repo-hygiene.result == 'success') }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Detect Java project
        id: detect
        shell: bash
        run: |
          maven=false
          gradle=false
          while IFS= read -r _; do maven=true; break; done < <(find . -maxdepth 5 -name pom.xml -not -path '*/node_modules/*' 2>/dev/null)
          while IFS= read -r _; do gradle=true; break; done < <(find . -maxdepth 5 \( -name 'build.gradle' -o -name 'build.gradle.kts' \) -not -path '*/node_modules/*' 2>/dev/null)
          echo "maven=$maven"   >> "$GITHUB_OUTPUT"
          echo "gradle=$gradle" >> "$GITHUB_OUTPUT"

      - name: Setup Java
        if: steps.detect.outputs.maven == 'true' || steps.detect.outputs.gradle == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'

      - name: Cache Maven local repository
        if: steps.detect.outputs.maven == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Cache Gradle
        if: steps.detect.outputs.gradle == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Java (Maven) - Compile
        if: steps.detect.outputs.maven == 'true'
        run: |
          if [ -f "mvnw" ]; then
            chmod +x mvnw
            ./mvnw -B -ntp compile
          else
            mvn -B -ntp compile
          fi

      - name: Java (Gradle) - Assemble
        if: steps.detect.outputs.maven == 'false' && steps.detect.outputs.gradle == 'true'
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assemble --no-daemon
          else
            gradle assemble --no-daemon
          fi

  php-check:
    name: Layer 1 - PHP Install & Syntax
    runs-on: ubuntu-latest
    needs: repo-hygiene
    timeout-minutes: 20
    if: ${{ !cancelled() && (!inputs.fail-fast-on-hygiene || needs.repo-hygiene.result == 'success') }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Detect PHP project
        id: detect
        run: |
          if [ -f composer.json ] || find . -maxdepth 5 -name '*.php' -not -path './vendor/*' -print -quit 2>/dev/null | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup PHP
        if: steps.detect.outputs.found == 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          tools: composer:v2

      - name: Cache Composer Dependencies
        if: steps.detect.outputs.found == 'true' && hashFiles('composer.lock') != ''
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-php${{ inputs.php-version }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-php${{ inputs.php-version }}-

      - name: PHP - Install & Syntax Check
        if: steps.detect.outputs.found == 'true'
        run: |
          failed=0
          if [ -f composer.json ]; then
            composer install --no-interaction --prefer-dist --optimize-autoloader \
              || { echo "::error::Composer install failed"; failed=1; }
          fi
          find . -name "*.php" -not -path "./vendor/*" -not -path "./node_modules/*" -print0 2>/dev/null \
            | xargs -0 -r -P"$(nproc)" -n1 php -l \
            || { echo "::error::PHP syntax check failed"; failed=1; }
          exit $failed

  python-check:
    name: Layer 1 - Python Lint
    runs-on: ubuntu-latest
    needs: repo-hygiene
    timeout-minutes: 20
    if: ${{ !cancelled() && (!inputs.fail-fast-on-hygiene || needs.repo-hygiene.result == 'success') }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Detect Python project
        id: detect
        run: |
          if [ -f requirements.txt ] || [ -f Pipfile ] || [ -f pyproject.toml ] || [ -f setup.py ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: steps.detect.outputs.found == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Python - Flake8 Fatal Check
        if: steps.detect.outputs.found == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install flake8 || { echo "::error::Flake8 install failed"; exit 1; }
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  go-check:
    name: Layer 1 - Go Vet & Build
    runs-on: ubuntu-latest
    needs: repo-hygiene
    timeout-minutes: 20
    if: ${{ !cancelled() && (!inputs.fail-fast-on-hygiene || needs.repo-hygiene.result == 'success') }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Detect Go project
        id: detect
        run: |
          if [ -f go.mod ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Go
        if: steps.detect.outputs.found == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
          cache: true

      - name: Go - Vet & Build
        if: steps.detect.outputs.found == 'true'
        run: |
          failed=0
          go vet ./... || { echo "::error::go vet failed"; failed=1; }
          go build ./... || { echo "::error::go build failed"; failed=1; }
          exit $failed

  dotnet-check:
    name: Layer 1 - .NET Restore & Build
    runs-on: ubuntu-latest
    needs: repo-hygiene
    timeout-minutes: 20
    if: ${{ !cancelled() && (!inputs.fail-fast-on-hygiene || needs.repo-hygiene.result == 'success') }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Detect .NET project
        id: detect
        run: |
          if find . -maxdepth 5 \( -name '*.csproj' -o -name '*.sln' -o -name '*.fsproj' \) -print -quit 2>/dev/null | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET
        if: steps.detect.outputs.found == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: .NET - Restore & Build
        if: steps.detect.outputs.found == 'true'
        run: |
          dotnet restore || { echo "::error::.NET restore failed"; exit 1; }
          dotnet build --no-restore --configuration Release || { echo "::error::.NET build failed"; exit 1; }

  docker-check:
    name: Layer 1 - Dockerfile Lint
    runs-on: ubuntu-latest
    needs: repo-hygiene
    timeout-minutes: 10
    if: ${{ !cancelled() && (!inputs.fail-fast-on-hygiene || needs.repo-hygiene.result == 'success') }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Detect Dockerfile
        id: detect
        run: |
          if find . -maxdepth 5 \( -iname 'Dockerfile' -o -iname 'Dockerfile.*' \) -print -quit 2>/dev/null | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint Dockerfiles (Hadolint)
        if: steps.detect.outputs.found == 'true'
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          failure-threshold: warning

  layer1-aggregate:
    name: Layer 1 - Aggregate Results
    runs-on: ubuntu-latest
    needs: [node-check, java-check, php-check, python-check, go-check, dotnet-check, docker-check]
    if: ${{ always() }}
    steps:
      - name: Aggregate Layer 1 Results
        run: |
          echo "=== Layer 1 Summary ==="
          failed=""
          [ "${{ needs.node-check.result }}"   = "failure" ] && failed="${failed}  - Node.js check failed\n"
          [ "${{ needs.java-check.result }}"   = "failure" ] && failed="${failed}  - Java check failed\n"
          [ "${{ needs.php-check.result }}"    = "failure" ] && failed="${failed}  - PHP check failed\n"
          [ "${{ needs.python-check.result }}" = "failure" ] && failed="${failed}  - Python check failed\n"
          [ "${{ needs.go-check.result }}"     = "failure" ] && failed="${failed}  - Go check failed\n"
          [ "${{ needs.dotnet-check.result }}" = "failure" ] && failed="${failed}  - .NET check failed\n"
          [ "${{ needs.docker-check.result }}" = "failure" ] && failed="${failed}  - Dockerfile check failed\n"

          if [ -n "$failed" ]; then
            printf "\nFailed checks:\n%b\n" "$failed"
            echo "Expand the corresponding job logs for details"
            echo "::error::Layer 1 has failing checks - fix and push again"
            exit 1
          fi
          echo "All Layer 1 checks passed"

  # ==========================================
  # Layer 2: Security & secret scan (Trivy)
  #
  # Note: trivy-action suffered a supply-chain attack in 2026-03.
  # The minimum safe tag is 0.35.0. For production, prefer SHA pinning.
  # ==========================================
  security-scan:
    name: Layer 2 - Security & Secret Scan
    runs-on: ubuntu-latest
    needs: layer1-aggregate
    permissions:
      contents: read
    if: ${{ !cancelled() }}
    timeout-minutes: 15
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Run Trivy Vulnerability & Secret Scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scanners: 'vuln,secret'
          ignore-unfixed: true
          format: 'table'
          severity: ${{ inputs.trivy-severity }}
          exit-code: ${{ inputs.trivy-exit-code }}

  # ==========================================
  # Layer 3: Coverage upload (optional)
  # - Consumer repos should upload artifacts named `coverage-*`
  #   from their own test jobs. This job merges them and,
  #   if CODECOV_TOKEN is set, uploads to Codecov.
  # ==========================================
  upload-coverage:
    name: Layer 3 - Upload Coverage (optional)
    runs-on: ubuntu-latest
    needs: layer1-aggregate
    if: ${{ !cancelled() && needs.layer1-aggregate.result == 'success' }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Download coverage artifacts (if any)
        id: download
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: coverage-*
          merge-multiple: true
          path: coverage

      - name: Check Codecov Token
        id: token
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          if [ -n "${CODECOV_TOKEN}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "CODECOV_TOKEN not set, skipping coverage upload"
          fi

      - name: Upload to Codecov
        if: steps.token.outputs.present == 'true' && steps.download.outcome == 'success'
        uses: codecov/codecov-action@v4
        with:
          directory: coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
