# ============================================================
# 可复用工作流 (Reusable Workflow)
# 仓库：2029193370/ci-templates
# 路径：.github/workflows/reusable-ci.yml
#
# 其他项目通过以下方式调用此工作流：
#   uses: 2029193370/ci-templates/.github/workflows/reusable-ci.yml@main
#
# 流水线结构：
#   Layer 1 — 代码质量检查 (Lint & Build)
#   Layer 2 — 安全漏洞与密钥泄露扫描 (Trivy)
#
# 支持语言：Node.js/TS · Java · PHP · Python · Go · .NET
# ============================================================

name: Reusable CI & Security

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js 版本'
        required: false
        type: string
        default: '22'
      java-version:
        description: 'Java 版本 (LTS: 17 / 21)'
        required: false
        type: string
        default: '17'
      php-version:
        description: 'PHP 版本'
        required: false
        type: string
        default: '8.2'
      python-version:
        description: 'Python 版本'
        required: false
        type: string
        default: '3.11'
      go-version:
        description: 'Go 版本'
        required: false
        type: string
        default: '1.22'
      dotnet-version:
        description: '.NET SDK 版本'
        required: false
        type: string
        default: '8.0'
      trivy-severity:
        description: 'Trivy 扫描严重程度阈值'
        required: false
        type: string
        default: 'CRITICAL,HIGH'

permissions:
  contents: read

jobs:
  # ==========================================
  # Layer 1: 代码质量检查 (Lint & Build)
  # ==========================================
  lint-and-build:
    name: Layer 1 - Lint & Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # ── Node.js / TypeScript / Next.js / React ─
      - name: Setup Node.js
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Install Node.js Dependencies
        if: hashFiles('package.json') != ''
        run: npm ci

      - name: Run Node.js Lint
        if: hashFiles('package.json') != ''
        run: npm run lint --if-present

      - name: Run Node.js Build
        if: hashFiles('package.json') != ''
        run: npm run build --if-present

      # ── Java (Maven / Gradle) ──────────────────
      - name: Setup Java
        if: hashFiles('pom.xml') != '' || hashFiles('build.gradle') != '' || hashFiles('build.gradle.kts') != ''
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: ${{ hashFiles('pom.xml') != '' && 'maven' || 'gradle' }}

      - name: Build with Maven
        if: hashFiles('pom.xml') != ''
        run: |
          if [ -f "mvnw" ]; then
            chmod +x mvnw
            ./mvnw -B compile
          else
            mvn -B compile
          fi

      - name: Build with Gradle
        if: hashFiles('pom.xml') == '' && (hashFiles('build.gradle') != '' || hashFiles('build.gradle.kts') != '')
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assemble --no-daemon
          else
            gradle assemble --no-daemon
          fi

      # ── PHP ────────────────────────────────────
      - name: Setup PHP
        if: hashFiles('composer.json') != '' || hashFiles('**/*.php') != ''
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          tools: composer:v2

      - name: Cache Composer Dependencies
        if: hashFiles('composer.lock') != ''
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-php${{ inputs.php-version }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-php${{ inputs.php-version }}-

      - name: Install Composer Dependencies
        if: hashFiles('composer.json') != ''
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run PHP Syntax Check
        if: hashFiles('**/*.php') != ''
        run: |
          find . -name "*.php" \
            -not -path "./vendor/*" \
            -not -path "./node_modules/*" \
            -print0 | xargs -0 -P$(nproc) -n1 php -l

      # ── Python ─────────────────────────────────
      - name: Setup Python
        if: hashFiles('requirements.txt') != '' || hashFiles('Pipfile') != '' || hashFiles('pyproject.toml') != ''
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'

      - name: Run Python Lint (Flake8)
        if: hashFiles('requirements.txt') != '' || hashFiles('Pipfile') != '' || hashFiles('pyproject.toml') != ''
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      # ── Go ──────────────────────────────────────
      - name: Setup Go
        if: hashFiles('go.mod') != ''
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}

      - name: Go Vet & Build
        if: hashFiles('go.mod') != ''
        run: |
          go vet ./...
          go build ./...

      # ── .NET (C#) ──────────────────────────────
      - name: Setup .NET
        if: hashFiles('**/*.csproj') != '' || hashFiles('**/*.sln') != ''
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: .NET Restore & Build
        if: hashFiles('**/*.csproj') != '' || hashFiles('**/*.sln') != ''
        run: |
          dotnet restore
          dotnet build --no-restore

  # ==========================================
  # Layer 2: 安全漏洞与密钥泄露扫描
  # ==========================================
  security-scan:
    name: Layer 2 - Security & Secret Scan
    runs-on: ubuntu-latest
    needs: lint-and-build
    timeout-minutes: 15
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@v0.34.0
        with:
          scan-type: 'fs'
          scanners: 'vuln,secret'
          ignore-unfixed: true
          format: 'table'
          severity: ${{ inputs.trivy-severity }}
          exit-code: '1'
