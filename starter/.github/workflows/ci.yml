name: CI & Security Scan

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    uses: 2029193370/ci-templates/.github/workflows/reusable-ci.yml@main
    # Uncomment the inputs you need; omitted ones use sensible defaults.
    # The reusable workflow auto-detects which language jobs to run.
    # with:
    #   node-version: '22'       # Node.js / TypeScript / Next.js
    #   java-version: '21'       # Java LTS (Maven / Gradle)
    #   php-version: '8.3'       # PHP / Laravel
    #   python-version: '3.12'   # Python / Django / FastAPI
    #   go-version: '1.23'       # Go
    #   dotnet-version: '8.0'    # .NET / C#
    #   trivy-severity: 'CRITICAL,HIGH'
    #   trivy-exit-code: '1'
